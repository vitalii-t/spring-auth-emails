<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; background: #f4f4f5; color: #18181b; }
        .wrap { max-width: 640px; margin: 48px auto; background: #fff; padding: 24px; border: 1px solid #e4e4e7; }
        button { margin-top: 16px; padding: 10px 14px; border: 0; background: #18181b; color: #fff; cursor: pointer; }
        .notice { padding: 10px; margin-bottom: 12px; background: #ecfeff; border: 1px solid #a5f3fc; }
    </style>
</head>
<body>
<div class="wrap">
    <h1>Dashboard</h1>
    <div class="notice" th:if="${status}" th:text="${status}"></div>
    <p>This page is protected. Guests are redirected to login and unverified users are redirected to the verification notice.</p>
    <p>Signed in as <strong th:text="${email}"></strong>.</p>

    <form th:action="@{/logout}" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
        <button type="submit">Logout</button>
    </form>
</div>
</body>
</html>
