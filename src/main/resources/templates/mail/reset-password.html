<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<body style="font-family: Arial, sans-serif; color: #18181b; line-height: 1.5;">
<p>Hi <span th:text="${name}">User</span>,</p>
<p>We received a password reset request for your account.</p>
<p>
    <a th:href="${resetUrl}" style="display: inline-block; padding: 10px 14px; background: #18181b; color: #ffffff; text-decoration: none;">
        Reset password
    </a>
</p>
<p>This link expires in <span th:text="${ttlMinutes}">60</span> minutes.</p>
<p>If the button does not work, open this URL:</p>
<p th:text="${resetUrl}">Reset URL</p>
</body>
</html>
