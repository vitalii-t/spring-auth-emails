<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify Email</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; background: #f4f4f5; color: #18181b; }
        .wrap { max-width: 560px; margin: 48px auto; background: #fff; padding: 24px; border: 1px solid #e4e4e7; }
        h1 { margin-top: 0; font-size: 24px; }
        p { line-height: 1.5; }
        button { margin-top: 12px; padding: 10px 14px; border: 0; background: #18181b; color: #fff; cursor: pointer; }
        .notice { padding: 10px; margin-bottom: 12px; background: #ecfeff; border: 1px solid #a5f3fc; }
    </style>
</head>
<body>
<div class="wrap">
    <h1>Verify your email</h1>
    <div class="notice" th:if="${status}" th:text="${status}"></div>
    <p>Your account is signed in, but protected pages stay blocked until you verify <strong th:text="${email}"></strong>.</p>
    <p>Check your inbox and open the verification link.</p>

    <form th:action="@{/verify-email/resend}" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
        <button type="submit">Resend verification email</button>
    </form>

    <form th:action="@{/logout}" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
        <button type="submit">Logout</button>
    </form>
</div>
</body>
</html>
