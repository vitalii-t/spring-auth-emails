<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; background: #f4f4f5; color: #18181b; }
        .wrap { max-width: 420px; margin: 48px auto; background: #fff; padding: 24px; border: 1px solid #e4e4e7; }
        h1 { margin-top: 0; font-size: 24px; }
        label { display: block; margin-top: 12px; font-weight: 600; }
        input { width: 100%; box-sizing: border-box; padding: 10px; margin-top: 6px; border: 1px solid #cbd5e1; }
        button { margin-top: 16px; padding: 10px 14px; border: 0; background: #18181b; color: #fff; cursor: pointer; }
        .error { color: #b91c1c; font-size: 14px; margin-top: 4px; }
        .links { margin-top: 16px; }
    </style>
</head>
<body>
<div class="wrap">
    <h1>Create account</h1>

    <form th:action="@{/register}" th:object="${form}" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
        <label for="name">Name</label>
        <input id="name" th:field="*{name}" type="text" required>
        <div class="error" th:errors="*{name}"></div>

        <label for="email">Email</label>
        <input id="email" th:field="*{email}" type="email" required>
        <div class="error" th:errors="*{email}"></div>

        <label for="password">Password</label>
        <input id="password" th:field="*{password}" type="password" required>
        <div class="error" th:errors="*{password}"></div>

        <label for="confirmPassword">Confirm password</label>
        <input id="confirmPassword" th:field="*{confirmPassword}" type="password" required>
        <div class="error" th:errors="*{confirmPassword}"></div>

        <button type="submit">Register</button>
    </form>

    <div class="links">
        <a th:href="@{/login}">Already have an account?</a>
    </div>
</div>
</body>
</html>
