<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; background: #f4f4f5; color: #18181b; }
        .wrap { max-width: 420px; margin: 48px auto; background: #fff; padding: 24px; border: 1px solid #e4e4e7; }
        label { display: block; margin-top: 12px; font-weight: 600; }
        input { width: 100%; box-sizing: border-box; padding: 10px; margin-top: 6px; border: 1px solid #cbd5e1; }
        button { margin-top: 16px; padding: 10px 14px; border: 0; background: #18181b; color: #fff; cursor: pointer; }
        .error { color: #b91c1c; font-size: 14px; margin-top: 4px; }
    </style>
</head>
<body>
<div class="wrap">
    <h1>Reset password</h1>

    <form th:action="@{/reset-password}" th:object="${form}" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
        <input th:field="*{token}" type="hidden">

        <label for="email">Email</label>
        <input id="email" th:field="*{email}" type="email" required readonly>
        <div class="error" th:errors="*{email}"></div>

        <label for="password">New password</label>
        <input id="password" th:field="*{password}" type="password" required>
        <div class="error" th:errors="*{password}"></div>

        <label for="confirmPassword">Confirm new password</label>
        <input id="confirmPassword" th:field="*{confirmPassword}" type="password" required>
        <div class="error" th:errors="*{confirmPassword}"></div>
        <div class="error" th:if="${#fields.hasGlobalErrors()}" th:each="err : ${#fields.globalErrors()}" th:text="${err}"></div>

        <button type="submit">Update password</button>
    </form>
</div>
</body>
</html>
