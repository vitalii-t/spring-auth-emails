<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; background: #f4f4f5; color: #18181b; }
        .wrap { max-width: 420px; margin: 48px auto; background: #fff; padding: 24px; border: 1px solid #e4e4e7; }
        h1 { margin-top: 0; font-size: 24px; }
        label { display: block; margin-top: 12px; font-weight: 600; }
        input { width: 100%; box-sizing: border-box; padding: 10px; margin-top: 6px; border: 1px solid #cbd5e1; }
        button { margin-top: 16px; padding: 10px 14px; border: 0; background: #18181b; color: #fff; cursor: pointer; }
        .links { margin-top: 16px; display: flex; justify-content: space-between; }
        .notice { padding: 10px; margin-bottom: 12px; background: #ecfeff; border: 1px solid #a5f3fc; }
        .error { padding: 10px; margin-bottom: 12px; background: #fef2f2; border: 1px solid #fecaca; }
    </style>
</head>
<body>
<div class="wrap">
    <h1>Sign in</h1>

    <div class="notice" th:if="${param.logout}">Signed out.</div>
    <div class="notice" th:if="${status}" th:text="${status}"></div>
    <div class="error" th:if="${param.error}">Invalid email or password.</div>
    <div class="error" th:if="${error}" th:text="${error}"></div>

    <form th:action="@{/login}" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
        <label for="username">Email</label>
        <input id="username" name="username" type="email" required>

        <label for="password">Password</label>
        <input id="password" name="password" type="password" required>

        <button type="submit">Login</button>
    </form>

    <div class="links">
        <a th:href="@{/register}">Create account</a>
        <a th:href="@{/forgot-password}">Forgot password?</a>
    </div>
</div>
</body>
</html>
