<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; background: #f4f4f5; color: #18181b; }
        .wrap { max-width: 420px; margin: 48px auto; background: #fff; padding: 24px; border: 1px solid #e4e4e7; }
        label { display: block; margin-top: 12px; font-weight: 600; }
        input { width: 100%; box-sizing: border-box; padding: 10px; margin-top: 6px; border: 1px solid #cbd5e1; }
        button { margin-top: 16px; padding: 10px 14px; border: 0; background: #18181b; color: #fff; cursor: pointer; }
        .notice { padding: 10px; margin-bottom: 12px; background: #ecfeff; border: 1px solid #a5f3fc; }
        .error { color: #b91c1c; font-size: 14px; margin-top: 4px; }
    </style>
</head>
<body>
<div class="wrap">
    <h1>Forgot password</h1>
    <div class="notice" th:if="${status}" th:text="${status}"></div>

    <form th:action="@{/forgot-password}" th:object="${form}" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
        <label for="email">Email</label>
        <input id="email" th:field="*{email}" type="email" required>
        <div class="error" th:errors="*{email}"></div>

        <button type="submit">Send reset link</button>
    </form>
</div>
</body>
</html>
